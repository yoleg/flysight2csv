# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Build documentation in the docs directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Install the package and docs dependencies using pip (into the RTD virtualenv).
# sphinx is pinned to <9 in docs/requirements.txt because myst-parser 4.x
# requires sphinx>=7,<9. RTD pre-installs the latest sphinx (>=9) before these
# steps run, so docs/requirements.txt downgrades it to a compatible version.
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt
